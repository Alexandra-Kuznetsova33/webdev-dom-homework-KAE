<!doctype html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <div id="main-content">
        <div class="loading-message">Загружаем комментарии...</div>
        <ul class="comments" style="display: none"></ul>

         <div class="auth-link" style="display: none;">
          Чтобы добавить комментарий,&ensp;<a href="#" class="auth-link-trigger">авторизуйтесь</a>
        </div>

        <div class="add-form">
          <input
            type="text"
            class="add-form-name"
            placeholder="Ваше имя"
            readonly
          />
          <textarea
            type="textarea"
            class="add-form-text"
            placeholder="Введите ваш коментарий"
            rows="4"
          ></textarea>
          <div class="add-form-row">
            <button class="add-form-button">Написать</button>
          </div>
        </div>
        <div class="adding-message" style="display: none">
          Комментарий добавляется...
        </div>
      </div>
      <div id="auth-page" style="display: none"></div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
