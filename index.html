<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";

    const commentsData = [
      {
        id: 1,
        name: "Глеб Фокин",
        text: "Это будет первый комментарий на этой странице",
        date: "12.02.22 12:18",
        likes: 3,
        isLiked: false 
      },
      {
        id: 2,
        name: "Варвара Н.",
        text: "Мне нравится как оформлена эта страница! ❤",
        date: "13.02.22 19:22",
        likes: 75,
        isLiked: true 
      }
    ];


    const commentsList = document.querySelector('.comments');
    const nameInput = document.querySelector('.add-form-name');
    const textInput = document.querySelector('.add-form-text');
    const addButton = document.querySelector('.add-form-button');


    function formatDate(date) {
      const dd = String(date.getDate()).padStart(2, '0');
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const yy = String(date.getFullYear()).slice(-2);
      const hh = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${dd}.${mm}.${yy} ${hh}:${min}`;
    }

    function renderComments() {
      commentsList.innerHTML = '';

      commentsData.forEach(comment => {
       const likeButtonClass = comment.isLiked ? 'like-button -active-like' : 'like-button';

        const commentHTML = `
          <li class="comment" data-id="${comment.id}">
            <div class="comment-header">
              <div>${comment.name}</div>
              <div>${comment.date}</div>
            </div>
            <div class="comment-body">
              <div class="comment-text">
                ${comment.text}
              </div>
            </div>
            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">${comment.likes}</span>
                <button class="${likeButtonClass}"></button>
              </div>
            </div>
          </li>
        `;

        commentsList.insertAdjacentHTML('beforeend', commentHTML);
      });
    }

    commentsList.addEventListener('click', function(event) {
      if (event.target.closest('.like-button')) {
        const likeButton = event.target.closest('.like-button');
        const commentElement = likeButton.closest('.comment');

        const commentId = parseInt(commentElement.dataset.id);

        const comment = commentsData.find(c => c.id === commentId);

        if (comment) {
          if (comment.isLiked) {
            comment.isLiked = false;
            comment.likes -= 1;
          } else {
            comment.isLiked = true;
            comment.likes += 1;
          }

          renderComments();
        }
      }
    });

    addButton.addEventListener('click', function () {
      const name = nameInput.value.trim();
      const text = textInput.value.trim();
    
      if (!name || !text) {
        alert('Пожалуйста, заполните имя и комментарий!');
        return;
      }

      const now = new Date();
      const newComment = {
        id: Date.now(), 
        name: name,
        text: text,
        date: formatDate(now),
        likes: 0,
        isLiked: false 
      };


      commentsData.push(newComment);
      renderComments();
    
      nameInput.value = '';
      textInput.value = '';
    });

    renderComments();
  </script>
</html>
