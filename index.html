<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>

    <div class="container">
      <div class="loading-message">Загружаем комментарии...</div>
      <ul class="comments" style="display: none;">
      
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
      <div class="adding-message" style="display: none;">Комментарий добавляется...</div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
