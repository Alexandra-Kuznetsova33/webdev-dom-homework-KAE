<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
      
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";

    const commentsData = [
      {
        id: 1,
        name: "Глеб Фокин",
        text: "Это будет первый комментарий на этой странице",
        date: "12.02.22 12:18",
        likes: 3,
        isLiked: false 
      },
      {
        id: 2,
        name: "Варвара Н.",
        text: "Мне нравится как оформлена эта страница! ❤",
        date: "13.02.22 19:22",
        likes: 75,
        isLiked: true 
      }
    ];


    const commentsList = document.querySelector('.comments');
    const nameInput = document.querySelector('.add-form-name');
    const textInput = document.querySelector('.add-form-text');
    const addButton = document.querySelector('.add-form-button');


    function formatDate(date) {
      const dd = String(date.getDate()).padStart(2, '0');
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const yy = String(date.getFullYear()).slice(-2);
      const hh = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${dd}.${mm}.${yy} ${hh}:${min}`;
    }


    function escapeHTML(str) {
      return str.replaceAll('&', '&')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '"')
                .replaceAll("'", "'")
                }

    function renderComments() {
      commentsList.innerHTML = '';

      commentsData.forEach(comment => {
        const likeButtonClass = comment.isLiked ? 'like-button -active-like' : 'like-button';

        let quotedBlock = '';
        let displayText = escapeHTML(comment.text);

        if (comment.text.startsWith('> Ответ на комментарий:')) {
          const parts = comment.text.split('\n');
          const quoteLine = parts[0]; 
          textInput.focus();
      
          const replyLines = parts.slice(1).map(line => escapeHTML(line)).join('\n');

          quotedBlock = `
            <div class="quoted-comment">
              <p>${quoteLine.replace('> ', '')}</p> 
            </div>
          `;

          displayText = replyLines ? `<div class="comment-text">${replyLines}</div>` : '';
        } else {
          displayText = `<div class="comment-text">${displayText}</div>`;
        }

        const commentHTML = `
          <li class="comment" data-id="${comment.id}">
            <div class="comment-header">
              <div>${escapeHTML(comment.name)}</div>
              <div>${comment.date}</div>
            </div>
            ${quotedBlock} 
            ${displayText} 
            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">${comment.likes}</span>
                <button class="${likeButtonClass}"></button>
              </div>
            </div>
          </li>
        `;

        commentsList.insertAdjacentHTML('beforeend', commentHTML);
      });
    }

    commentsList.addEventListener('click', function(event) {
      if (event.target.closest('.like-button')) {
        const likeButton = event.target.closest('.like-button');
        const commentElement = likeButton.closest('.comment');

        const commentId = parseInt(commentElement.dataset.id);

        const comment = commentsData.find(c => c.id === commentId);

        if (comment) {
          if (comment.isLiked) {
            comment.isLiked = false;
            comment.likes -= 1;
          } else {
            comment.isLiked = true;
            comment.likes += 1;
          }

          renderComments();
        }
      }
    });

    ////ответ на комментарий
    commentsList.addEventListener('click', function(event) {
    const target = event.target;

    
      if (target.closest('.like-button')) {
        event.stopPropagation(); 
        return;
      }

    
      const commentElement = target.closest('.comment');
      if (commentElement) {
        const commentId = parseInt(commentElement.dataset.id);
        const comment = commentsData.find(c => c.id === commentId);
    
        if (comment) {
          const quotedText = `> Ответ на комментарий: ${escapeHTML(comment.name)} : ${escapeHTML(comment.text)}\n`;;
          textInput.value = quotedText;
          textInput.focus();
        }
      }
    });
    renderComments();

    addButton.addEventListener('click', function () {
      const name = nameInput.value.trim();
      const text = textInput.value.trim();
    
      if (!name || !text) {
        alert('Пожалуйста, заполните имя и комментарий!');
        return;
      }

      const now = new Date();
      const newComment = {
        id: Date.now(), 
        name: name,
        text: text,
        date: formatDate(now),
        likes: 0,
        isLiked: false 
      };


      commentsData.push(newComment);
      renderComments();
    
      nameInput.value = '';
      textInput.value = '';
    });

    renderComments();
  </script>
</html>
